<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>universidad de huánuco | requisitos</title>
<link rel="icon" type="image/png" href="../assets/img/logo 2.png" />
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,200..800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="assets/css/app.css" />
<script src="https://cdn.tailwindcss.com"></script>

<style>
  :root{ --nav-h: 80px; }

  body{ background:#faf7f0; }

  .gradient-primary{
    background: linear-gradient(135deg, #ecc138 0%, #5a9e8d 100%);
  }

  /* nav scroll */
  #navbar{ transition:.3s ease; }
  #navbar.is-scrolled{
    background:rgba(250,247,240,.95);
    backdrop-filter:blur(10px);
    border-bottom:1px solid rgba(61,60,59,.16);
  }

  /* sidebar link */
  .req-link{
    display:block;
    width:100%;
    text-align:left;
    padding:12px 16px;
    border-radius:14px;
    font-weight:700;
    color:rgba(255,255,255,.75);
    transition:.2s ease;
    cursor:pointer;
    user-select:none;
  }
  .req-link:hover{
    background:rgba(255,255,255,.1);
    color:#fff;
  }
  .req-link.is-active{
    background:rgba(90,158,141,.35);
    color:#fff;
  }

  /* visor card */
  .viewer-card{
    background:white;
    border-radius:24px;
    padding:30px;
    box-shadow:0 15px 40px rgba(0,0,0,.08);
    border:1px solid rgba(61,60,59,.12);
  }
</style>
</head>

<body class="font-sans text-[#3d3c3b]">

    <!-- NAVBAR -->

  <div id="navbar-container"></div>  

  <!-- clave: el main se separa automáticamente del navbar fixed -->
  <main style="padding-top: var(--nav-h);">
    <section class="grid lg:grid-cols-[340px_1fr] min-h-screen">

      <!-- sidebar -->
      <aside class="hidden lg:flex flex-col justify-between bg-[#3d3c3b] text-white p-10 sticky overflow-y-auto"
             style="top: var(--nav-h); height: calc(100vh - var(--nav-h));">

        <div>
          <p class="text-xs tracking-widest text-white/50">Repositorio</p>
          <h2 class="text-3xl font-extrabold mt-4">
            Requisitos<br>posgrado
          </h2>

          <nav class="mt-8 space-y-2" id="reqnav">
            <!-- mejor: button (evita bugs de <a> sin href) -->
            <button type="button" class="req-link" data-pdf="./assets/pdf/requisitos/requisitos_maestrias.pdf">
              Maestrías
            </button>

            <button type="button" class="req-link" data-pdf="./assets/pdf/requisitos/requisitos_doctorado.pdf">
              Doctorados
            </button>

            <button type="button" class="req-link" data-pdf="./assets/pdf/requisitos/requisitossegundaespecialidad.pdf">
              Segunda especialidad
            </button>
          </nav>
        </div>

        <div class="mt-10">
          <p class="text-xs text-white/50">© 2026 universidad de huánuco — posgrado</p>
        </div>

      </aside>

      <!-- contenido derecho -->
      <div class="p-10 max-w-5xl">
        <h1 class="text-5xl font-extrabold">Requisitos</h1>
        <div class="w-16 h-2 bg-[#5a9e8d] rounded mt-4"></div>

        <div class="viewer-card mt-10">

          <div id="pdfcontainer" class="w-full h-[70vh] min-h-[520px] bg-gray-100 rounded-xl flex items-center justify-center text-gray-500">
            Selecciona un requisito del panel izquierdo
          </div>

          <div class="mt-8 text-center">
            <a id="downloadbtn"
               href=""
               target="_blank"
               rel="noopener"
               class="hidden inline-flex items-center justify-center gap-3
                      bg-[#5a9e8d] hover:bg-[#4c8778]
                      text-white font-semibold
                      px-8 py-3 rounded-full
                      shadow-md hover:shadow-lg
                      transition-all duration-300">
              descargar pdf
              <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentcolor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="m12 16v-8m0 8l-3-3m3 3l3-3m-10 7h14"/>
              </svg>
            </a>
          </div>

        </div>
      </div>

    </section>
  </main>

  <!-- Footer -->
  <div id="footer-container"></div>

<script>

  // visor pdf
  const links = document.querySelectorAll(".req-link")
  const container = document.getElementById("pdfcontainer")
  const downloadbtn = document.getElementById("downloadbtn")

  links.forEach(link => {
    link.addEventListener("click", () => {
      links.forEach(l => l.classList.remove("is-active"))
      link.classList.add("is-active")

      const pdf = link.getAttribute("data-pdf")

      container.innerHTML = `
        <iframe src="${pdf}" class="w-full h-full rounded-xl" frameborder="0"></iframe>
      `

      downloadbtn.href = pdf
      downloadbtn.classList.remove("hidden")
    })
  })

  // dropdowns handled by app.js initNavbar()
</script>
<script src="assets/js/app.js"></script>

</body>
</html>
