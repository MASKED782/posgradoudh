<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>UDH - Requisitos</title>
  <link rel="icon" href="assets/img/icon.png?v=2" type="image/png">
  <link rel="shortcut icon" href="assets/img/icon.png?v=2" type="image/png">
  <link rel="apple-touch-icon" href="assets/img/icon.png?v=2">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,200..800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="assets/css/app.css" />
  <script src="https://cdn.tailwindcss.com"></script>

  <style>
    :root{ --nav-h: 80px; }

    body{ background:#faf7f0; }

    .gradient-primary{
      background: linear-gradient(135deg, #ecc138 0%, #5a9e8d 100%);
    }

    #navbar{ transition:.3s ease; }
    #navbar.is-scrolled{
      background:rgba(250,247,240,.95);
      backdrop-filter:blur(10px);
      border-bottom:1px solid rgba(61,60,59,.16);
    }

    /* sidebar link */
    .req-link{
      display:block;
      width:100%;
      text-align:left;
      padding:12px 16px;
      border-radius:14px;
      font-weight:700;
      color:rgba(255,255,255,.75);
      transition:.2s ease;
      cursor:pointer;
      user-select:none;
    }
    .req-link:hover{
      background:rgba(255,255,255,.1);
      color:#fff;
    }
    .req-link.is-active{
      background:rgba(90,158,141,.35);
      color:#fff;
    }

    /* visor card */
    .viewer-card{
      background:white;
      border-radius:24px;
      padding:30px;
      box-shadow:0 15px 40px rgba(0,0,0,.08);
      border:1px solid rgba(61,60,59,.12);
    }

    /* MOBILE DROPDOWN */
    .mobile-nav-select {
      display: none;
      position: relative;
      margin-bottom: 24px;
    }

    .mobile-nav-btn {
      width: 100%;
      padding: 14px 18px;
      background: #3d3c3b;
      color: #fff;
      border: none;
      border-radius: 14px;
      font-size: 15px;
      font-weight: 700;
      font-family: inherit;
      text-align: left;
      cursor: pointer;
      display: flex;
      justify-content: space-between;
      align-items: center;
      box-shadow: 0 4px 16px rgba(0,0,0,0.12);
    }

    .mobile-nav-btn .chevron {
      font-size: 18px;
      transition: transform 0.2s ease;
      opacity: 0.7;
    }
    .mobile-nav-btn .chevron.open {
      transform: rotate(180deg);
    }

    .mobile-nav-menu {
      display: none;
      position: absolute;
      top: calc(100% + 6px);
      left: 0; right: 0;
      background: #3d3c3b;
      border-radius: 14px;
      overflow: hidden;
      z-index: 100;
      box-shadow: 0 12px 32px rgba(0,0,0,0.22);
    }
    .mobile-nav-menu.is-open {
      display: block;
    }

    .mobile-nav-option {
      display: block;
      width: 100%;
      padding: 13px 18px;
      background: none;
      border: none;
      border-bottom: 1px solid rgba(255,255,255,0.08);
      color: rgba(255,255,255,0.75);
      font-size: 14px;
      font-weight: 700;
      font-family: inherit;
      text-align: left;
      cursor: pointer;
      transition: background 0.15s, color 0.15s;
    }
    .mobile-nav-option:last-child { border-bottom: none; }
    .mobile-nav-option:hover { background: rgba(255,255,255,0.08); color: #fff; }
    .mobile-nav-option.is-active { background: rgba(90,158,141,0.30); color: #fff; }

    @media (max-width: 1023px) {
      .mobile-nav-select { display: block; }
    }
  </style>
</head>

<body class="font-sans text-[#3d3c3b]">

  <div id="navbar-container"></div>

    <main style="padding-top: var(--nav-h);">
      <section class="grid lg:grid-cols-[340px_1fr] min-h-screen">

        <!-- sidebar desktop -->
        <aside class="hidden lg:flex flex-col justify-between bg-[#3d3c3b] text-white p-10 sticky overflow-y-auto"
              style="top: var(--nav-h); height: calc(100vh - var(--nav-h));">
          <div>
            <p class="text-xs tracking-widest text-white/50">Repositorio</p>
            <h2 class="text-3xl font-extrabold mt-4">Requisitos<br>posgrado</h2>

            <nav class="mt-8 space-y-2" id="reqnav">
              <button type="button" class="req-link" data-pdf="./assets/pdf/requisitos/requisitos_maestrias.pdf">Maestrías</button>
              <button type="button" class="req-link" data-pdf="./assets/pdf/requisitos/requisitos_doctorado.pdf">Doctorados</button>
              <button type="button" class="req-link" data-pdf="./assets/pdf/requisitos/requisitossegundaespecialidad.pdf">Segunda especialidad</button>
            </nav>
          </div>

          <div class="mt-10">
            <p class="text-xs text-white/50">© 2026 universidad de huánuco — posgrado</p>
          </div>
        </aside>

        <!-- contenido derecho -->
        <div class="p-6 lg:p-10 max-w-5xl">
          <h1 class="text-5xl font-extrabold">Requisitos</h1>
          <div class="w-16 h-2 bg-[#5a9e8d] rounded mt-4"></div>

          <!-- DROPDOWN MÓVIL -->
          <div class="mobile-nav-select mt-8" id="mobileReqNav">
            <button class="mobile-nav-btn" id="mobileReqBtn" type="button">
              <span id="mobileReq_label">Selecciona una categoría</span>
              <span class="chevron" id="mobileReq_chevron">▾</span>
            </button>
            <div class="mobile-nav-menu" id="mobileReq_menu">
              <button class="mobile-nav-option" data-pdf="./assets/pdf/requisitos/requisitos_maestrias.pdf">Maestrías</button>
              <button class="mobile-nav-option" data-pdf="./assets/pdf/requisitos/requisitos_doctorado.pdf">Doctorados</button>
              <button class="mobile-nav-option" data-pdf="./assets/pdf/requisitos/requisitossegundaespecialidad.pdf">Segunda especialidad</button>
            </div>
          </div>

          <div class="viewer-card mt-6 lg:mt-10">
            <div id="pdfcontainer" class="w-full h-[70vh] min-h-[520px] bg-gray-100 rounded-xl flex items-center justify-center text-gray-500">
              Selecciona un requisito del panel izquierdo
            </div>

            <div class="mt-8 text-center">
              <a id="downloadbtn"
                href=""
                target="_blank"
                rel="noopener"
                class="hidden inline-flex items-center justify-center gap-3
                        bg-[#5a9e8d] hover:bg-[#4c8778]
                        text-white font-semibold
                        px-8 py-3 rounded-full
                        shadow-md hover:shadow-lg
                        transition-all duration-300">
                descargar pdf
                <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentcolor">
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="m12 16v-8m0 8l-3-3m3 3l3-3m-10 7h14"/>
                </svg>
              </a>
            </div>
          </div>
        </div>

      </section>
    </main>

  <div id="footer-container"></div>

<script>
  const container = document.getElementById("pdfcontainer");
  const downloadbtn = document.getElementById("downloadbtn");

  function loadPdf(pdf, label) {
    const isMobile = window.innerWidth < 1024;
    const lbl = document.getElementById('mobileReq_label');
    if (lbl && label) lbl.textContent = label;

    if (isMobile) {
      container.innerHTML = `
        <div style="display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;gap:20px;padding:32px;text-align:center;">
          <svg xmlns="http://www.w3.org/2000/svg" width="56" height="56" fill="none" viewBox="0 0 24 24" stroke="#5a9e8d" stroke-width="1.5">
            <path stroke-linecap="round" stroke-linejoin="round" d="M19.5 14.25v-2.625a3.375 3.375 0 0 0-3.375-3.375h-1.5A1.125 1.125 0 0 1 13.5 7.125v-1.5a3.375 3.375 0 0 0-3.375-3.375H8.25m0 12.75h7.5m-7.5 3H12M10.5 2.25H5.625c-.621 0-1.125.504-1.125 1.125v17.25c0 .621.504 1.125 1.125 1.125h12.75c.621 0 1.125-.504 1.125-1.125V11.25a9 9 0 0 0-9-9Z"/>
          </svg>
          <p style="font-weight:800;font-size:17px;color:#3d3c3b;">${label || 'Documento seleccionado'}</p>
          <a href="${pdf}" target="_blank" rel="noopener"
             style="display:inline-flex;align-items:center;gap:10px;background:#5a9e8d;color:#fff;font-weight:700;font-size:15px;padding:14px 28px;border-radius:14px;text-decoration:none;">
            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
              <path stroke-linecap="round" stroke-linejoin="round" d="M13.5 6H5.25A2.25 2.25 0 0 0 3 8.25v10.5A2.25 2.25 0 0 0 5.25 21h10.5A2.25 2.25 0 0 0 18 18.75V10.5m-10.5 6L21 3m0 0h-5.25M21 3v5.25"/>
            </svg>
            Abrir PDF
          </a>
          <a href="${pdf}" download
             style="display:inline-flex;align-items:center;gap:10px;background:transparent;color:#3d3c3b;font-weight:700;font-size:14px;padding:10px 20px;border-radius:14px;text-decoration:none;border:1.5px solid rgba(61,60,59,0.2);">
            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
              <path stroke-linecap="round" stroke-linejoin="round" d="M3 16.5v2.25A2.25 2.25 0 0 0 5.25 21h13.5A2.25 2.25 0 0 0 21 18.75V16.5M16.5 12 12 16.5m0 0L7.5 12m4.5 4.5V3"/>
            </svg>
            Descargar PDF
          </a>
        </div>`;
      downloadbtn.classList.add("hidden");
    } else {
      container.innerHTML = `<iframe src="${pdf}" style="width:100%;height:75vh;min-height:520px;border:0;border-radius:12px;"></iframe>`;
      downloadbtn.href = pdf;
      downloadbtn.classList.remove("hidden");
    }
  }

  // Sidebar desktop
  const links = document.querySelectorAll(".req-link");
  links.forEach(link => {
    link.addEventListener("click", () => {
      links.forEach(l => l.classList.remove("is-active"));
      link.classList.add("is-active");
      loadPdf(link.getAttribute("data-pdf"), link.textContent.trim());
    });
  });

  // Dropdown móvil
  (function(){
    const btn = document.getElementById('mobileReqBtn');
    const menu = document.getElementById('mobileReq_menu');
    const chevron = document.getElementById('mobileReq_chevron');
    const options = menu.querySelectorAll('.mobile-nav-option');

    btn.addEventListener('click', (e) => {
      e.stopPropagation();
      const isOpen = menu.classList.contains('is-open');
      menu.classList.toggle('is-open', !isOpen);
      chevron.classList.toggle('open', !isOpen);
    });

    options.forEach(opt => {
      opt.addEventListener('click', (e) => {
        e.stopPropagation();
        options.forEach(o => o.classList.remove('is-active'));
        opt.classList.add('is-active');

        document.getElementById('mobileReq_label').textContent = opt.textContent.trim();
        menu.classList.remove('is-open');
        chevron.classList.remove('open');

        loadPdf(opt.getAttribute('data-pdf'), opt.textContent.trim());
      });
    });

    document.addEventListener('click', () => {
      menu.classList.remove('is-open');
      chevron.classList.remove('open');
    });
  })();
</script>

<script src="assets/js/app.js"></script>
</body>
</html>
