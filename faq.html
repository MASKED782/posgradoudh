<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>UDH - Preguntas Frecuentes</title>
  <link rel="icon" href="assets/img/icon.png?v=2" type="image/png">
  <link rel="shortcut icon" href="assets/img/icon.png?v=2" type="image/png">
  <link rel="apple-touch-icon" href="assets/img/icon.png?v=2">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=inter:wght@400;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="assets/css/app.css" />
  <script src="https://cdn.tailwindcss.com"></script>

  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: { sans: ['inter','system-ui','sans-serif'] },
          colors: {
            jet:'#3d3c3b',
            primary:'#ecc138',
            background:'#faf7f0',
            border:'rgba(61,60,59,0.16)',
            foreground:'#3d3c3b',
            muted:'rgba(61,60,59,0.72)'
          }
        }
      }
    }
  </script>

  <style>
    body{ background:#faf7f0; }

    #navbar{ transition: all .3s ease; }
    #navbar.is-scrolled{
      background: rgba(250,247,240,0.95);
      backdrop-filter: blur(10px);
      border-bottom: 1px solid rgba(61,60,59,0.16);
    }

    .docs-link{
      display:block;
      padding:10px 12px;
      border-radius:14px;
      font-weight:700;
      color:rgba(255,255,255,.75);
      transition:all .2s ease;
      cursor: pointer;
    }
    .docs-link:hover{
      background:rgba(255,255,255,.1);
      color:#fff;
      transform:translateX(3px);
    }
    .docs-link.is-active{
      background:rgba(236,193,56,.25);
      color:#fff;
    }

    .viewer{
      border-radius:24px;
      overflow:hidden;
      background:white;
      box-shadow:0 12px 30px rgba(0,0,0,.1);
      border:1px solid rgba(61,60,59,.16);
      min-height:600px;
      transition:all .25s ease;
    }
    .viewer iframe{
      width:100%;
      height:650px;
      border:0;
    }
    .placeholder{
      height:650px;
      display:flex;
      align-items:center;
      justify-content:center;
      text-align:center;
      color:rgba(61,60,59,.6);
    }

    /* MOBILE DROPDOWN */
    .mobile-nav-select {
      display: none;
      position: relative;
      margin-bottom: 24px;
    }

    .mobile-nav-btn {
      width: 100%;
      padding: 14px 18px;
      background: #3d3c3b;
      color: #fff;
      border: none;
      border-radius: 14px;
      font-size: 15px;
      font-weight: 700;
      font-family: inherit;
      text-align: left;
      cursor: pointer;
      display: flex;
      justify-content: space-between;
      align-items: center;
      box-shadow: 0 4px 16px rgba(0,0,0,0.12);
    }

    .mobile-nav-btn .chevron {
      font-size: 18px;
      transition: transform 0.2s ease;
      opacity: 0.7;
    }
    .mobile-nav-btn .chevron.open {
      transform: rotate(180deg);
    }

    .mobile-nav-menu {
      display: none;
      position: absolute;
      top: calc(100% + 6px);
      left: 0; right: 0;
      background: #3d3c3b;
      border-radius: 14px;
      overflow: hidden;
      z-index: 100;
      box-shadow: 0 12px 32px rgba(0,0,0,0.22);
    }
    .mobile-nav-menu.is-open {
      display: block;
    }

    .mobile-nav-option {
      display: block;
      width: 100%;
      padding: 13px 18px;
      background: none;
      border: none;
      border-bottom: 1px solid rgba(255,255,255,0.08);
      color: rgba(255,255,255,0.75);
      font-size: 14px;
      font-weight: 700;
      font-family: inherit;
      text-align: left;
      cursor: pointer;
      transition: background 0.15s, color 0.15s;
    }
    .mobile-nav-option:last-child { border-bottom: none; }
    .mobile-nav-option:hover { background: rgba(255,255,255,0.08); color: #fff; }
    .mobile-nav-option.is-active { background: rgba(236,193,56,0.22); color: #fff; }

    @media (max-width: 1023px) {
      .mobile-nav-select { display: block; }
    }
  </style>
</head>

<body class="font-sans text-foreground">

  <div id="navbar-container"></div>

  <main>
    <section class="grid lg:grid-cols-[340px_1fr] min-h-screen">

      <!-- SIDEBAR desktop -->
      <aside class="hidden lg:flex flex-col justify-between
              bg-[#3d3c3b] text-white p-10
              sticky top-[75px]
              h-[calc(100vh-75px)]
              overflow-y-auto">
        <div>
          <p class="text-xs tracking-widest text-white/50">REPOSITORIO</p>
          <h2 class="text-3xl font-extrabold mt-4">Documentos<br>Posgrado</h2>

          <nav id="docsNav" class="mt-8 space-y-1">
            <a class="docs-link" data-pdf="./assets/pdf/faq/faq_maestria_doctorado.pdf">
              Maestrías y Doctorado | Segunda Especialidad
            </a>
          </nav>
        </div>

        <div class="mt-10">
          <p class="text-xs text-white/50">© 2026 universidad de huánuco — posgrado</p>
        </div>
      </aside>

      <!-- VISOR -->
      <div class="pt-24 p-6 lg:p-10 max-w-5xl">
        <h1 class="text-5xl font-extrabold">Preguntas Frecuentes</h1>
        <div class="w-16 h-2 bg-[#5A9E8D] rounded mt-4"></div>

        <!-- DROPDOWN MÓVIL -->
        <div class="mobile-nav-select mt-8" id="mobileFaqNav">
          <button class="mobile-nav-btn" id="mobileFaqBtn" type="button">
            <span id="mobileFaq_label">Selecciona un documento</span>
            <span class="chevron" id="mobileFaq_chevron">▾</span>
          </button>
          <div class="mobile-nav-menu" id="mobileFaq_menu">
            <button class="mobile-nav-option" data-pdf="./assets/pdf/faq/faq_maestria_doctorado.pdf">
              Maestrías y Doctorado | Segunda Especialidad
            </button>
          </div>
        </div>

        <div class="mt-6 lg:mt-10 viewer">
          <div id="pdfcontainer" style="width:100%; height:75vh; min-height:520px; display:flex; align-items:center; justify-content:center; text-align:center; color:rgba(61,60,59,.6);">
            <div>
              <p style="font-weight:800; font-size:18px;">Sin documento seleccionado</p>
              <p style="margin-top:8px;">Haz click en un documento del panel izquierdo</p>
            </div>
          </div>
        </div>
      </div>

    </section>
  </main>

  <div id="footer-container"></div>

  <script>
    const pdfcontainer = document.getElementById('pdfcontainer');

    function loadPdf(pdf, label) {
      const isMobile = window.innerWidth < 1024;
      const lbl = document.getElementById('mobileFaq_label');
      if (lbl && label) lbl.textContent = label;

      if (isMobile) {
        pdfcontainer.innerHTML = `
          <div style="display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;gap:20px;padding:32px;text-align:center;">
            <svg xmlns="http://www.w3.org/2000/svg" width="56" height="56" fill="none" viewBox="0 0 24 24" stroke="#5a9e8d" stroke-width="1.5">
              <path stroke-linecap="round" stroke-linejoin="round" d="M19.5 14.25v-2.625a3.375 3.375 0 0 0-3.375-3.375h-1.5A1.125 1.125 0 0 1 13.5 7.125v-1.5a3.375 3.375 0 0 0-3.375-3.375H8.25m0 12.75h7.5m-7.5 3H12M10.5 2.25H5.625c-.621 0-1.125.504-1.125 1.125v17.25c0 .621.504 1.125 1.125 1.125h12.75c.621 0 1.125-.504 1.125-1.125V11.25a9 9 0 0 0-9-9Z"/>
            </svg>
            <p style="font-weight:800;font-size:17px;color:#3d3c3b;">${label || 'Documento seleccionado'}</p>
            <a href="${pdf}" target="_blank" rel="noopener"
               style="display:inline-flex;align-items:center;gap:10px;background:#3d3c3b;color:#fff;font-weight:700;font-size:15px;padding:14px 28px;border-radius:14px;text-decoration:none;">
              <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                <path stroke-linecap="round" stroke-linejoin="round" d="M13.5 6H5.25A2.25 2.25 0 0 0 3 8.25v10.5A2.25 2.25 0 0 0 5.25 21h10.5A2.25 2.25 0 0 0 18 18.75V10.5m-10.5 6L21 3m0 0h-5.25M21 3v5.25"/>
              </svg>
              Abrir PDF
            </a>
            <a href="${pdf}" download
               style="display:inline-flex;align-items:center;gap:10px;background:transparent;color:#3d3c3b;font-weight:700;font-size:14px;padding:10px 20px;border-radius:14px;text-decoration:none;border:1.5px solid rgba(61,60,59,0.2);">
              <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                <path stroke-linecap="round" stroke-linejoin="round" d="M3 16.5v2.25A2.25 2.25 0 0 0 5.25 21h13.5A2.25 2.25 0 0 0 21 18.75V16.5M16.5 12 12 16.5m0 0L7.5 12m4.5 4.5V3"/>
              </svg>
              Descargar PDF
            </a>
          </div>`;
      } else {
        pdfcontainer.innerHTML = `<iframe src="${pdf}" style="width:100%;height:75vh;min-height:520px;border:0;border-radius:16px;"></iframe>`;
      }
    }

    // Sidebar desktop
    (function(){
      const navLinks = document.querySelectorAll('#docsNav .docs-link');
      navLinks.forEach(link => {
        link.addEventListener('click', () => {
          navLinks.forEach(l => l.classList.remove('is-active'));
          link.classList.add('is-active');
          loadPdf(link.getAttribute('data-pdf'), link.textContent.trim());
        });
      });
    })();

    // Dropdown móvil
    (function(){
      const btn = document.getElementById('mobileFaqBtn');
      const menu = document.getElementById('mobileFaq_menu');
      const chevron = document.getElementById('mobileFaq_chevron');
      const options = menu.querySelectorAll('.mobile-nav-option');

      btn.addEventListener('click', (e) => {
        e.stopPropagation();
        const isOpen = menu.classList.contains('is-open');
        menu.classList.toggle('is-open', !isOpen);
        chevron.classList.toggle('open', !isOpen);
      });

      options.forEach(opt => {
        opt.addEventListener('click', (e) => {
          e.stopPropagation();
          options.forEach(o => o.classList.remove('is-active'));
          opt.classList.add('is-active');

          document.getElementById('mobileFaq_label').textContent = opt.textContent.trim();
          menu.classList.remove('is-open');
          chevron.classList.remove('open');

          loadPdf(opt.getAttribute('data-pdf'), opt.textContent.trim());
        });
      });

      document.addEventListener('click', () => {
        menu.classList.remove('is-open');
        chevron.classList.remove('open');
      });
    })();
  </script>

  <script src="https://unpkg.com/lucide@latest"></script>
  <script src="assets/js/app.js"></script>
</body>
</html>
